<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Personal Landing Page</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: "Poppins", system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background-color: #f5f5f5;
      color: #222;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    a {
      text-decoration: none;
      color: inherit;
    }

    /* ── Top bar ── */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 60px;
      font-size: 14px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .logo {
      font-weight: 600;
      letter-spacing: 0.03em;
    }

    .logo span.role {
      font-weight: 400;
      font-size: 12px;
      margin-left: 6px;
      color: #777;
    }

    .top-right {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
    }

    .top-nav a {
      margin-left: 20px;
      font-size: 13px;
      color: #444;
    }

    .top-nav a:hover {
      text-decoration: underline;
    }

    /* ── Language switcher ── */
    .lang-switcher {
      display: flex;
      gap: 6px;
    }

    .lang-btn {
      background: none;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 3px 8px;
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      color: #555;
      transition: background 0.15s, color 0.15s;
    }

    .lang-btn.active,
    .lang-btn:hover {
      background: #f8a100;
      border-color: #f8a100;
      color: #fff;
    }

    /* ── Main content ── */
    .main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 60px 60px;
    }

    .hero {
      max-width: 960px;
      width: 100%;
      display: grid;
      grid-template-columns: 280px 1fr;
      column-gap: 80px;
      align-items: center;
    }

    .photo-wrapper {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .photo-circle {
      width: 260px;
      height: 260px;
      border-radius: 50%;
      background: #dedede;
      border: 10px solid #f5f5f5;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
      overflow: hidden;
    }

    .photo-circle img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .hero-content h1 {
      font-size: clamp(36px, 5vw, 52px);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .hero-content h1 span {
      color: #f8a100;
    }

    .hero-content h2 {
      font-size: clamp(15px, 2vw, 18px);
      margin-bottom: 10px;
      font-weight: 600;
    }

    .hero-content p {
      font-size: 13px;
      line-height: 1.7;
      color: #666;
      max-width: 420px;
      margin-bottom: 32px;
    }

    .hero-buttons {
      display: flex;
      gap: 28px;
      flex-wrap: wrap;
    }

    .hero-button {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 500;
      color: #fff;
      box-shadow: 0 8px 18px rgba(0, 0, 0, 0.18);
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      text-align: center;
      padding: 8px;
    }

    .hero-button.resume   { background: #f8a100; }
    .hero-button.projects { background: #f5514f; }
    .hero-button.contact  { background: #39c5d6; }

    .hero-button:hover {
      transform: translateY(-3px);
      box-shadow: 0 12px 24px rgba(0, 0, 0, 0.22);
    }

    /* ── Footer ── */
    .footer {
      font-size: 11px;
      color: #777;
      padding: 18px 60px 24px;
      display: flex;
      align-items: flex-end;
      justify-content: space-between;
      border-top: 1px solid #ddd;
      flex-wrap: wrap;
      gap: 16px;
    }

    .footer-group {
      display: flex;
      gap: 60px;
      flex-wrap: wrap;
    }

    .footer-item-title {
      font-weight: 500;
      margin-bottom: 2px;
    }

    .footer-right {
      text-align: right;
      line-height: 1.6;
    }

    .social {
      margin-top: 4px;
    }

    .social a {
      margin-left: 4px;
      color: #444;
    }

    /* ── Mobile ── */
    @media (max-width: 700px) {
      .top-bar {
        padding: 16px 20px;
        flex-direction: column;
        align-items: flex-start;
      }

      .top-right {
        width: 100%;
        justify-content: space-between;
      }

      .top-nav a:first-child {
        margin-left: 0;
      }

      .hero {
        grid-template-columns: 1fr;
        row-gap: 28px;
        text-align: center;
        justify-items: center;
      }

      .photo-circle {
        width: 180px;
        height: 180px;
      }

      .hero-content p {
        margin-left: auto;
        margin-right: auto;
      }

      .hero-buttons {
        justify-content: center;
        gap: 20px;
      }

      .hero-button {
        width: 80px;
        height: 80px;
      }

      .main {
        padding: 20px 20px 40px;
      }

      .footer {
        padding: 16px 20px 20px;
        flex-direction: column;
        align-items: flex-start;
      }

      .footer-group {
        flex-direction: column;
        gap: 10px;
      }

      .footer-right {
        text-align: left;
      }
    }

    @media (min-width: 701px) and (max-width: 900px) {
      .top-bar { padding: 20px 30px; }

      .hero {
        grid-template-columns: 1fr;
        row-gap: 30px;
        text-align: center;
        justify-items: center;
      }

      .hero-content p {
        margin-left: auto;
        margin-right: auto;
      }

      .hero-buttons { justify-content: center; }

      .main { padding: 20px 30px 40px; }

      .footer {
        padding-left: 30px;
        padding-right: 30px;
        flex-direction: column;
        align-items: flex-start;
        gap: 10px;
      }

      .footer-group { flex-direction: column; gap: 10px; }
      .footer-right  { text-align: left; }
    }
  </style>
</head>
<body>
  <!-- Top bar -->
  <header class="top-bar">
    <div class="logo">
      Vsevolod Stepanov <span class="role" data-i18n="role">Economist</span>
    </div>
    <div class="top-right">
      <nav class="top-nav">
        <a href="#resume"   data-i18n="nav_resume">Resume</a>
        <a href="#projects" data-i18n="nav_projects">Projects</a>
        <a href="#contact"  data-i18n="nav_contact">Contact</a>
      </nav>
      <div class="lang-switcher">
        <button class="lang-btn active" onclick="setLang('en')">EN</button>
        <button class="lang-btn"        onclick="setLang('de')">DE</button>
        <button class="lang-btn"        onclick="setLang('cs')">CS</button>
      </div>
    </div>
  </header>

  <!-- Main hero section -->
  <main class="main">
    <section class="hero">
      <div class="photo-wrapper">
        <div class="photo-circle">
          <img src="Profile.png" alt="Profile photo" />
        </div>
      </div>

      <div class="hero-content">
        <h1 data-i18n="hero_greeting">Hello</h1>
        <h2 data-i18n="hero_subtitle">A Bit About Me</h2>
        <p data-i18n="hero_bio">
          I'm a bachelor student at Wirtschaftsuniversität Wien.
        </p>

        <div class="hero-buttons">
          <a href="#resume"   class="hero-button resume"   data-i18n="btn_resume">Resume</a>
          <a href="#projects" class="hero-button projects" data-i18n="btn_projects">Projects</a>
          <a href="#contact"  class="hero-button contact"  data-i18n="btn_contact">Contact</a>
        </div>
      </div>
    </section>
  </main>

  <!-- Footer -->
  <footer class="footer">
    <div class="footer-group">
      <div>
        <div class="footer-item-title" data-i18n="footer_phone">Phone</div>
        <div>+436641320946</div>
      </div>
      <div>
        <div class="footer-item-title" data-i18n="footer_email">Email</div>
        <div>work@vsevolodstepanov.org</div>
      </div>
    </div>

    <div class="footer-right">
      <div class="footer-item-title" data-i18n="footer_follow">Follow Me</div>
      <div class="social">
        <a href="#">in</a>
        <a href="#">tw</a>
      </div>
      <div style="margin-top:6px;" data-i18n="footer_copy">© 2026 by Vsevolod Stepanov.</div>
    </div>
  </footer>

  <script>
    const translations = {
      en: {
        role:          "Economist",
        nav_resume:    "Resume",
        nav_projects:  "Projects",
        nav_contact:   "Contact",
        hero_greeting: "Hello",
        hero_subtitle: "A Bit About Me",
        hero_bio:      "I'm a bachelor student at Wirtschaftsuniversität Wien.",
        btn_resume:    "Resume",
        btn_projects:  "Projects",
        btn_contact:   "Contact",
        footer_phone:  "Phone",
        footer_email:  "Email",
        footer_follow: "Follow Me",
        footer_copy:   "© 2026 by Vsevolod Stepanov.",
      },
      de: {
        role:          "Ökonom",
        nav_resume:    "Lebenslauf",
        nav_projects:  "Projekte",
        nav_contact:   "Kontakt",
        hero_greeting: "Hallo",
        hero_subtitle: "Ein bisschen über mich",
        hero_bio:      "Ich bin Bachelorstudent an der Wirtschaftsuniversität Wien.",
        btn_resume:    "Lebenslauf",
        btn_projects:  "Projekte",
        btn_contact:   "Kontakt",
        footer_phone:  "Telefon",
        footer_email:  "E-Mail",
        footer_follow: "Folgen Sie mir",
        footer_copy:   "© 2026 von Vsevolod Stepanov.",
      },
      cs: {
        role:          "Ekonom",
        nav_resume:    "Životopis",
        nav_projects:  "Projekty",
        nav_contact:   "Kontakt",
        hero_greeting: "Ahoj",
        hero_subtitle: "Trochu o mně",
        hero_bio:      "Jsem bakalářský student na Wirtschaftsuniversität Wien.",
        btn_resume:    "Životopis",
        btn_projects:  "Projekty",
        btn_contact:   "Kontakt",
        footer_phone:  "Telefon",
        footer_email:  "E-mail",
        footer_follow: "Sledujte mě",
        footer_copy:   "© 2026 Vsevolod Stepanov.",
      },
    };

    function setLang(lang) {
      const t = translations[lang];
      document.querySelectorAll("[data-i18n]").forEach(el => {
        const key = el.getAttribute("data-i18n");
        if (t[key] !== undefined) el.textContent = t[key];
      });
      document.documentElement.lang = lang;
      document.querySelectorAll(".lang-btn").forEach(btn => {
        btn.classList.toggle("active", btn.textContent.toLowerCase() === lang);
      });
    }
  </script>
</body>
</html>
